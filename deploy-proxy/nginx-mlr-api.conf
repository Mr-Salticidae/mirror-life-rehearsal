# 《镜像自我·人生预演》AI 中转入口
# 挂进 tiaozhuxiansheng.com 的 server 块（include 本文件，或把 location 拷进去）。
# /mlr-api/v1/chat/completions → 127.0.0.1:3002/v1/chat/completions（mlr-proxy.service）
location /mlr-api/ {
    proxy_pass http://127.0.0.1:3002/;
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Origin $http_origin;

    # SSE 流式（读心打字机渲染）必须关缓冲，否则整段憋到完稿才吐
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # 观众照片以 dataURL 进请求体，放宽体积
    client_max_body_size 10m;
}
